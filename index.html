<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<title>Anshul's IP Logger · Nothing Light Optimized</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

  :root {
    --bg: #f5f5f7;
    --grid-line: rgba(0, 0, 0, 0.04);
    --panel-bg: rgba(255, 255, 255, 0.85);
    --panel-border: rgba(0, 0, 0, 0.06);
    --panel-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    --accent: #ff2b2b;
    --text-main: #111;
    --text-soft: #555;
    --text-muted: #888;
  }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    overflow: hidden;
  }

  /* Optimized mesh */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(200,200,200,0.25), transparent 60%);
    filter: blur(18px);
    animation: meshMove 45s ease-in-out infinite;
    will-change: transform;
    z-index: -2;
  }

  @keyframes meshMove {
    0% { transform: translate(0,0); }
    50% { transform: translate(-30px, 40px); }
    100% { transform: translate(0,0); }
  }

  .page-root {
    position: relative;
    width: 100vw;
    height: 100vh;
    padding: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Optimized grid */
  .grid-background {
    position: absolute;
    inset: -10vh;
    background:
      linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
    background-size: 90px 90px;
    z-index: -1;
  }

  /* Panel grid */
  .panel-grid {
    display: grid;
    grid-template-columns: minmax(260px, 360px) minmax(260px, 360px);
    grid-auto-rows: minmax(220px, auto);
    gap: 24px;
    max-width: 900px;
    width: 100%;
  }

  /* Optimized glass panels */
  .glass-panel {
    background: var(--panel-bg);
    border-radius: 24px;
    border: 1px solid var(--panel-border);
    box-shadow: var(--panel-shadow);
    backdrop-filter: blur(6px) saturate(140%);
    padding: 20px 22px;
    transform: translateZ(0);
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .panel-title {
    font-size: 0.9rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-soft);
  }

  .panel-tag {
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .panel-body label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 10px;
    margin-bottom: 4px;
  }

  .panel-body input,
  .panel-body select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 999px;
    border: 1px solid rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.9);
    font-size: 0.85rem;
    color: var(--text-main);
    transition: 0.12s;
  }

  .panel-body input:focus,
  .panel-body select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .panel-body button {
    margin-top: 12px;
    width: 100%;
    padding: 10px 14px;
    border-radius: 999px;
    border: none;
    background: rgba(0,0,0,0.06);
    color: var(--text-main);
    font-size: 0.85rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.12s;
  }

  .panel-body button:hover {
    color: var(--accent);
  }

  /* Optimized IP table */
  #ipTableContainer {
    margin-top: 8px;
    max-height: 160px;
    overflow-y: auto;
    border-radius: 16px;
    border: 1px solid rgba(0,0,0,0.06);
    background: rgba(255,255,255,0.9);
    will-change: transform;
  }

  #ipTableContainer table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
  }

  #ipTableContainer th,
  #ipTableContainer td {
    padding: 6px 8px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    text-align: left;
    white-space: nowrap;
  }

  #ipTableContainer th {
    background: rgba(0,0,0,0.03);
    position: sticky;
    top: 0;
  }

  a {
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
  }
</style>

</head>
<body>
    <div class="page-root">
  <div class="grid-background"></div>

  <div class="panel-grid">

    <!-- Branding Panel -->
    <div class="glass-panel">
      <div class="panel-header">
        <div class="panel-title">ANSHUL'S IP LOGGER</div>
        <div class="panel-tag">LIVE</div>
      </div>
      <div class="panel-body">
        <p style="font-size:0.8rem; color:var(--text-soft);">
          Nothing‑style optimized dashboard. Generate tracking links, log visits, and view IP data in real time.
        </p>
        <p id="systemStatus" style="font-size:0.75rem; color:var(--text-muted); margin-top:10px;">
          Initializing…
        </p>
      </div>
    </div>

    <!-- Shortener Panel -->
    <div class="glass-panel">
      <div class="panel-header">
        <div class="panel-title">TRACKING LINK SHORTENER</div>
        <div class="panel-tag">LINK</div>
      </div>
      <div class="panel-body">
        <label>Destination URL</label>
        <input id="url" type="text" placeholder="https://example.com">

        <label>Custom ID (optional)</label>
        <input id="slug" type="text" placeholder="Leave blank to auto‑generate">

        <label>Shortener</label>
        <select id="shortener">
          <option value="tinyurl">TinyURL</option>
          <option value="isgd">is.gd</option>
          <option value="vgd">v.gd</option>
          <option value="tly">T.LY (API key required)</option>
        </select>

        <button onclick="makeLink()">Generate Link</button>

        <div id="output" style="margin-top:10px; font-size:0.75rem; color:var(--text-soft);"></div>
      </div>
    </div>

    <!-- IP Viewer Panel -->
    <div class="glass-panel">
      <div class="panel-header">
        <div class="panel-title">LOGGED IPS</div>
        <div class="panel-tag">FIREBASE</div>
      </div>
      <div class="panel-body">
        <div id="ipTableContainer">Loading…</div>
      </div>
    </div>

    <!-- System Panel -->
    <div class="glass-panel">
      <div class="panel-header">
        <div class="panel-title">SYSTEM STATUS</div>
        <div class="panel-tag">STATUS</div>
      </div>
      <div class="panel-body">
        <p style="font-size:0.8rem; color:var(--text-soft);">
          Firebase, tracking, shortener, and viewer performance optimized.
        </p>
      </div>
    </div>

  </div>
</div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCh05Jp95UGx2UZiJhjMjiZ6LZAl7908eM",
  authDomain: "ip-logger-27238.firebaseapp.com",
  databaseURL: "https://ip-logger-27238-default-rtdb.firebaseio.com",
  projectId: "ip-logger-27238",
  storageBucket: "ip-logger-27238.appspot.com",
  messagingSenderId: "691731801990",
  appId: "1:691731801990:web:e91f751d7ea72a9ba46e07",
  measurementId: "G-HFK1GMT07P"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const systemStatusEl = document.getElementById("systemStatus");

// Device Info
function getDeviceInfo() {
  const ua = navigator.userAgent;
  return {
    device: /Mobile|Android|iPhone|iPad/.test(ua) ? "Mobile" : "Desktop",
    browser: ua.includes("Chrome") ? "Chrome" :
             ua.includes("Safari") ? "Safari" :
             ua.includes("Firefox") ? "Firefox" :
             ua.includes("Edg") ? "Edge" : "Unknown",
    os: ua.includes("Windows") ? "Windows" :
        ua.includes("Mac") ? "MacOS" :
        ua.includes("Android") ? "Android" :
        ua.includes("iPhone") || ua.includes("iPad") ? "iOS" : "Unknown"
  };
}

// Tracking Mode
const params = new URLSearchParams(window.location.search);
const id = params.get("track");

if (id) {
  systemStatusEl.textContent = "Tracking mode: logging visit…";

  db.ref("links/" + id).once("value").then(snap => {
    const data = snap.val();
    if (!data || !data.url) return;

    const destination = data.url;

    fetch("https://api.ipify.org/?format=json")
      .then(res => res.json())
      .then(ipData => {
        const ip = ipData.ip;
        const info = getDeviceInfo();
        const time = new Date().toLocaleString();
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        db.ref("logs").push({
          ip,
          device: info.device,
          browser: info.browser,
          os: info.os,
          time,
          timezone,
          linkId: id,
          destination
        });

        setTimeout(() => {
          window.location.href = destination;
        }, 900); // faster redirect
      });
  });
} else {
  systemStatusEl.textContent = "Dashboard mode: ready";
}

// Shortener
async function makeLink() {
  const realURL = document.getElementById("url").value.trim();
  let slug = document.getElementById("slug").value.trim();
  const shortener = document.getElementById("shortener").value;

  if (!realURL) {
    alert("Enter a destination URL.");
    return;
  }

  if (!slug) {
    slug = "id_" + Math.random().toString(36).substring(2, 8);
  }

  await db.ref("links/" + slug).set({ url: realURL });

  const fullTrackingLink = window.location.origin + "/iplogger/?track=" + slug;

  let shortLink = "";

  if (shortener === "tinyurl") {
    shortLink = await fetch(
      "https://tinyurl.com/api-create.php?url=" + encodeURIComponent(fullTrackingLink)
    ).then(res => res.text());
  } else if (shortener === "isgd") {
    shortLink = await fetch(
      "https://is.gd/create.php?format=simple&url=" + encodeURIComponent(fullTrackingLink)
    ).then(res => res.text());
  } else if (shortener === "vgd") {
    shortLink = await fetch(
      "https://v.gd/create.php?format=simple&url=" + encodeURIComponent(fullTrackingLink)
    ).then(res => res.text());
  } else if (shortener === "tly") {
    const apiKey = "YOUR_TLY_API_KEY";
    const response = await fetch("https://t.ly/api/v1/link/shorten", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": apiKey
      },
      body: JSON.stringify({
        long_url: fullTrackingLink,
        domain: "https://t.ly/"
      })
    }).then(res => res.json());

    shortLink = response.short_url;
  }

  document.getElementById("output").innerHTML =
    "Shortened Link (" + shortener + "):<br><a href='" + shortLink + "' target='_blank'>" + shortLink + "</a><br><br>" +
    "Full Tracking Link:<br><a href='" + fullTrackingLink + "' target='_blank'>" + fullTrackingLink + "</a>";

  systemStatusEl.textContent = "Link generated";
}

// Optimized Logs Viewer
db.ref("logs").limitToLast(50).on("value", snap => {
  const logs = snap.val();
  const container = document.getElementById("ipTableContainer");

  if (!logs) {
    container.innerHTML = "No logs yet.";
    return;
  }

  let html = "<table><tr><th>IP</th><th>Device</th><th>Browser</th><th>OS</th><th>Time</th><th>Timezone</th><th>Link ID</th></tr>";
  Object.keys(logs).reverse().forEach(key => {
    const l = logs[key];
    html += `<tr>
      <td>${l.ip}</td>
      <td>${l.device}</td>
      <td>${l.browser}</td>
      <td>${l.os}</td>
      <td>${l.time}</td>
      <td>${l.timezone}</td>
      <td>${l.linkId}</td>
    </tr>`;
  });
  html += "</table>";

  container.innerHTML = html;
});
</script>

</body>
</html>
